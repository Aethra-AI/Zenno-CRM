<!DOCTYPE html>
<html>
<head>
    <title>Prueba WebSocket EXC</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        #chat { width: 100%; height: 300px; border: 1px solid #444; padding: 10px; overflow-y: scroll; background: #000; margin-bottom: 10px; border-radius: 8px; line-height: 1.5; }
        input { width: 80%; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: #007bff; vertical-align: middle; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <h2>🚀 EXC Realtime Test</h2>
    <div id="chat"></div>
    <input type="text" id="msg" placeholder="Escribe algo al agente...">
    <button onclick="send()">Enviar</button>

    <script>
        let ws;
        const chat = document.getElementById('chat');
        const msgInput = document.getElementById('msg');

        function send() {
            const message = msgInput.value;
            if (!message) return;

            // Abrir conexión a la NUEVA ruta del Backend
            ws = new WebSocket('ws://' + window.location.host + '/api/agents/chat-ws');
            
            chat.innerHTML += '<b>Tú:</b> ' + message + '<br><b>EXC:</b> <span id="current-op"></span><span class="cursor"></span><br><br>';
            const currentOp = document.getElementById('current-op');
            currentOp.removeAttribute('id'); // Liberar el ID para el siguiente mensaje
            
            ws.onopen = () => {
                ws.send(JSON.stringify({ message: message }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'text') {
                    // Pintar las letras conforme llegan
                    chat.lastChild.previousSibling.previousSibling.innerHTML += data.text;
                    chat.scrollTop = chat.scrollHeight;
                } else if (data.type === 'done' || data.type === 'stop') {
                    chat.querySelector('.cursor')?.remove();
                } else if (data.type === 'error') {
                    chat.innerHTML += '<span style="color:red">Error: ' + data.text + '</span><br>';
                }
            };

            msgInput.value = '';
        }
    </script>
</body>
</html>
